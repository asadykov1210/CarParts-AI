name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ secrets.GHCR_USERNAME }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build Docker image
      run: |
        docker buildx build --platform linux/amd64 -t ghcr.io/${{ secrets.GHCR_USERNAME }}/carparts_api:latest .


    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/carparts_api:latest
